AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: |
  Nested stack for AgentFunction (POST /agent), part of the openapi-client shared API.

Parameters:
  RestApiId:
    Type: String
    Description: >-
      ID of the shared REST API (the root template's OpenApiClientApi) that AgentFunction
      attaches its route to.

Globals:
  Function:
    Timeout: 30
    LoggingConfig:
      LogFormat: JSON

Resources:
  AgentFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../agent/
      Handler: app.lambda_handler
      Runtime: python3.12
      Architectures:
      - x86_64
      Environment:
        Variables:
          OPENAI_API_KEY: "{{resolve:ssm:/openai-client/openai-api-key}}"
      Events:
        Agent:
          Type: Api
          Properties:
            RestApiId: !Ref RestApiId
            Path: /agent
            Method: post
            Auth:
              ApiKeyRequired: true

Outputs:
  AgentFunctionArn:
    Description: Agent Lambda Function ARN
    Value: !GetAtt AgentFunction.Arn

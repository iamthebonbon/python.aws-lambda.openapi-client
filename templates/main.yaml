AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: |
  Nested stack for MainFunction (GET /main), part of the openapi-client shared API.

Parameters:
  RestApiId:
    Type: String
    Description: >-
      ID of the shared REST API (the root template's OpenApiClientApi) that MainFunction
      attaches its route to.

Globals:
  Function:
    Timeout: 30
    LoggingConfig:
      LogFormat: JSON

Resources:
  MainFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../app/
      Handler: app.lambda_handler
      Runtime: python3.12
      Architectures:
      - x86_64
      Events:
        Main:
          Type: Api
          Properties:
            RestApiId: !Ref RestApiId
            Path: /main
            Method: get
            Auth:
              ApiKeyRequired: true

Outputs:
  MainFunctionArn:
    Description: Main Lambda Function ARN
    Value: !GetAtt MainFunction.Arn

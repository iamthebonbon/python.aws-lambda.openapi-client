AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  openapi-client

  Sample SAM Template for openapi-client

Parameters:
  OpenAIApiKey:
    Type: String
    NoEcho: true
    Description: API key used by AgentFunction to call the OpenAI API

# More info about Globals: https://github.com/awslabs/serverless-application-model/blob/master/docs/globals.rst
Globals:
  Function:
    Timeout: 15

    # You can add LoggingConfig parameters such as the Logformat, Log Group, and SystemLogLevel or ApplicationLogLevel. Learn more here https://docs.aws.amazon.com/serverless-application-model/latest/developerguide/sam-resource-function.html#sam-function-loggingconfig.
    LoggingConfig:
      LogFormat: JSON
Resources:
  OpenApiClientApi:
    Type: AWS::Serverless::Api # Explicit API to enable ApiKeyRequired
    Properties:
      StageName: Prod
      Auth:
        ApiKeyRequired: true

  HelloWorldFunction:
    Type: AWS::Serverless::Function # More info about Function Resource: https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#awsserverlessfunction
    Properties:
      CodeUri: app/
      Handler: app.lambda_handler
      Runtime: python3.12
      Architectures:
      - x86_64
      Events:
        HelloWorld:
          Type: Api # More info about API Event Source: https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#api
          Properties:
            RestApiId: !Ref OpenApiClientApi
            Path: /hello
            Method: get

  AgentFunction:
    Type: AWS::Serverless::Function # More info about Function Resource: https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#awsserverlessfunction
    Properties:
      CodeUri: agent/
      Handler: app.lambda_handler
      Runtime: python3.12
      Architectures:
      - x86_64
      Environment:
        Variables:
          OPENAI_API_KEY: !Ref OpenAIApiKey
      Events:
        Agent:
          Type: Api # More info about API Event Source: https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#api
          Properties:
            RestApiId: !Ref OpenApiClientApi
            Path: /agent
            Method: post

  ApiKey:
    Type: AWS::ApiGateway::ApiKey
    DependsOn:
    - OpenApiClientApiProdStage
    Properties:
      Name: openapi-client-api-key
      Description: API key required to call the openapi-client API
      Enabled: true
      StageKeys:
      - RestApiId: !Ref OpenApiClientApi
        StageName: Prod

  UsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    DependsOn:
    - OpenApiClientApiProdStage
    Properties:
      UsagePlanName: openapi-client-usage-plan
      Description: Throttling and quota applied to callers of the openapi-client API key
      ApiStages:
      - ApiId: !Ref OpenApiClientApi
        Stage: Prod
      Throttle:
        RateLimit: 10
        BurstLimit: 20
      Quota:
        Limit: 10000
        Period: MONTH

  UsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref ApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref UsagePlan

Outputs:
  HelloWorldApi:
    Description: API Gateway endpoint URL for Prod stage for Hello World
      function
    Value: !Sub "https://${OpenApiClientApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/Prod/hello/"
  HelloWorldFunction:
    Description: Hello World Lambda Function ARN
    Value: !GetAtt HelloWorldFunction.Arn
  HelloWorldFunctionIamRole:
    Description: Implicit IAM Role created for Hello World function
    Value: !GetAtt HelloWorldFunctionRole.Arn
  AgentApi:
    Description: API Gateway endpoint URL for Prod stage for the Agent function
    Value: !Sub "https://${OpenApiClientApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/Prod/agent/"
  AgentFunction:
    Description: Agent Lambda Function ARN
    Value: !GetAtt AgentFunction.Arn
  ApiKeyId:
    Description: API Key ID; fetch the value with `aws apigateway get-api-key --include-value`
    Value: !Ref ApiKey

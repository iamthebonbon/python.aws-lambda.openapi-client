AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: |
  openai-client

# More info about Globals: https://github.com/awslabs/serverless-application-model/blob/master/docs/globals.rst
Globals:
  Function:
    Timeout: 30
    # You can add LoggingConfig parameters such as the Logformat, Log Group, and SystemLogLevel or ApplicationLogLevel. Learn more here https://docs.aws.amazon.com/serverless-application-model/latest/developerguide/sam-resource-function.html#sam-function-loggingconfig.
    LoggingConfig:
      LogFormat: JSON
Resources:
  OpenApiClientApi:
    Type: AWS::Serverless::Api # SAM-managed API: since both routes now live in this same template, SAM's
    Properties:                # transform can see them and generate the Deployment/Stage itself.
      Name: openapi-client-api
      StageName: Prod
      Auth:
        ApiKeyRequired: true # Applies to every route below; no need to repeat it per function.

  MainFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: app/
      Handler: app.lambda_handler
      Runtime: python3.12
      Architectures:
      - x86_64
      Events:
        Main:
          Type: Api
          Properties:
            RestApiId: !Ref OpenApiClientApi
            Path: /main
            Method: get

  AgentFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: agent/
      Handler: app.lambda_handler
      Runtime: python3.12
      Architectures:
      - x86_64
      Environment:
        Variables:
          OPENAI_API_KEY: "{{resolve:ssm:/openai-client/openai-api-key}}"
          MEMORY_TABLE: !Ref MemoryTable
          CONVERSATION_TABLE: !Ref ConversationTable
      Policies:
      - DynamoDBCrudPolicy:
          TableName: !Ref MemoryTable
      - DynamoDBCrudPolicy:
          TableName: !Ref ConversationTable
      Events:
        Agent:
          Type: Api
          Properties:
            RestApiId: !Ref OpenApiClientApi
            Path: /agent
            Method: post
        AgentWithConversation:
          Type: Api
          Properties:
            RestApiId: !Ref OpenApiClientApi
            Path: /agent/{conversationId}
            Method: post

  MemoryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: openapi-client-agent-db
      AttributeDefinitions:
      - AttributeName: fact_id
        AttributeType: S
      KeySchema:
      - AttributeName: fact_id
        KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      OnDemandThroughput:
        MaxReadRequestUnits: 100
        MaxWriteRequestUnits: 50

  ConversationTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: openapi-client-conversation-db
      AttributeDefinitions:
      - AttributeName: conversation_id
        AttributeType: S
      KeySchema:
      - AttributeName: conversation_id
        KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      OnDemandThroughput:
        MaxReadRequestUnits: 100
        MaxWriteRequestUnits: 50

  # DependsOn the SAM-generated Prod stage (logical id: "<Api logical id><StageName>Stage") so the
  # API key/usage plan attach only once the stage they reference actually exists.
  ApiKey:
    Type: AWS::ApiGateway::ApiKey
    DependsOn:
    - OpenApiClientApiProdStage
    Properties:
      Name: openapi-client-api-key
      Description: API key required to call the openapi-client API
      Enabled: true
      StageKeys:
      - RestApiId: !Ref OpenApiClientApi
        StageName: Prod

  UsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    DependsOn:
    - OpenApiClientApiProdStage
    Properties:
      UsagePlanName: openapi-client-usage-plan
      Description: Throttling and quota applied to callers of the openapi-client API key
      ApiStages:
      - ApiId: !Ref OpenApiClientApi
        Stage: Prod
      Throttle:
        RateLimit: 10
        BurstLimit: 20
      Quota:
        Limit: 10000
        Period: MONTH

  UsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref ApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref UsagePlan

Outputs:
  MainApi:
    Description: API Gateway endpoint URL for Prod stage for Main function
      function
    Value: !Sub "https://${OpenApiClientApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/Prod/main/"
  MainFunction:
    Description: Main Lambda Function ARN
    Value: !GetAtt MainFunction.Arn
  AgentApi:
    Description: API Gateway endpoint URL for Prod stage for the Agent function
    Value: !Sub "https://${OpenApiClientApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/Prod/agent/"
  AgentFunction:
    Description: Agent Lambda Function ARN
    Value: !GetAtt AgentFunction.Arn
  ApiKeyId:
    Description: API Key ID; fetch the value with `aws apigateway get-api-key --include-value`
    Value: !Ref ApiKey
  MemoryTable:
    Description: DynamoDB table storing the Agent function's semantic memory (one item per fact)
    Value: !Ref MemoryTable
  ConversationTable:
    Description: DynamoDB table storing conversation history (one item per conversation)
    Value: !Ref ConversationTable

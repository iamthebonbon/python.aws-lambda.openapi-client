AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: |
  openai-client

# More info about Globals: https://github.com/awslabs/serverless-application-model/blob/master/docs/globals.rst
Globals:
  Function:
    Timeout: 30
    # You can add LoggingConfig parameters such as the Logformat, Log Group, and SystemLogLevel or ApplicationLogLevel. Learn more here https://docs.aws.amazon.com/serverless-application-model/latest/developerguide/sam-resource-function.html#sam-function-loggingconfig.
    LoggingConfig:
      LogFormat: JSON
Resources:
  OpenApiClientApi:
    Type: AWS::ApiGateway::RestApi # Plain RestApi (not AWS::Serverless::Api): its own Deployment/Stage
    Properties:                    # are hand-managed below so nested-stack routes (see MainFunctionStack)
      Name: openapi-client-api     # are included; AWS::Serverless::Api can't be told to skip its
                                    # same-template-only implicit Deployment/Stage.

  MainFunctionStack:
    Type: AWS::Serverless::Application # More info: https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#awsserverlessapplication
    Properties:
      Location: templates/main.yaml
      Parameters:
        RestApiId: !Ref OpenApiClientApi

  AgentFunction:
    Type: AWS::Serverless::Function # More info about Function Resource: https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#awsserverlessfunction
    Properties:
      CodeUri: agent/
      Handler: app.lambda_handler
      Runtime: python3.12
      Architectures:
      - x86_64
      Environment:
        Variables:
          OPENAI_API_KEY: "{{resolve:ssm:/openai-client/openai-api-key}}"
      Events:
        Agent:
          Type: Api # More info about API Event Source: https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#api
          Properties:
            RestApiId: !Ref OpenApiClientApi
            Path: /agent
            Method: post
            Auth:
              ApiKeyRequired: true # OpenApiClientApi is a plain RestApi now, so this no longer
                                   # inherits from a template-level Auth block; set per event instead.

  # Explicit Deployment/Stage: OpenApiClientApi is a plain RestApi (see above) so nothing manages
  # these automatically. DependsOn both route sources so a redeploy always covers Agent's in-template
  # method and MainFunctionStack's nested-stack method.
  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
    - AgentFunction
    - MainFunctionStack
    Properties:
      RestApiId: !Ref OpenApiClientApi
      Description: Deployment covering AgentFunction's and MainFunctionStack's routes

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref OpenApiClientApi
      DeploymentId: !Ref ApiDeployment
      StageName: Prod

  ApiKey:
    Type: AWS::ApiGateway::ApiKey
    DependsOn:
    - ApiStage
    Properties:
      Name: openapi-client-api-key
      Description: API key required to call the openapi-client API
      Enabled: true
      StageKeys:
      - RestApiId: !Ref OpenApiClientApi
        StageName: Prod

  UsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    DependsOn:
    - ApiStage
    Properties:
      UsagePlanName: openapi-client-usage-plan
      Description: Throttling and quota applied to callers of the openapi-client API key
      ApiStages:
      - ApiId: !Ref OpenApiClientApi
        Stage: Prod
      Throttle:
        RateLimit: 10
        BurstLimit: 20
      Quota:
        Limit: 10000
        Period: MONTH

  UsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref ApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref UsagePlan

Outputs:
  MainApi:
    Description: API Gateway endpoint URL for Prod stage for Main function
      function
    Value: !Sub "https://${OpenApiClientApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/Prod/main/"
  MainFunction:
    Description: Main Lambda Function ARN
    Value: !GetAtt MainFunctionStack.Outputs.MainFunctionArn
  AgentApi:
    Description: API Gateway endpoint URL for Prod stage for the Agent function
    Value: !Sub "https://${OpenApiClientApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/Prod/agent/"
  AgentFunction:
    Description: Agent Lambda Function ARN
    Value: !GetAtt AgentFunction.Arn
  ApiKeyId:
    Description: API Key ID; fetch the value with `aws apigateway get-api-key --include-value`
    Value: !Ref ApiKey

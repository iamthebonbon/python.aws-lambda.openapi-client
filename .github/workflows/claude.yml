name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude')) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          allowed_bots: claude
          claude_args: |
            --allowedTools "Read,Write,Edit,Grep,Glob,WebSearch,WebFetch,Skill,Bash(git *),Bash(gh *),Bash(python *),Bash(pip *)"
          prompt: |
            Implement the changes described in this issue or comment:
            Issue/PR title: ${{ github.event.issue.title || github.event.pull_request.title }}
            Issue body: ${{ github.event.issue.body || '' }}
            Comment: ${{ github.event.comment.body || github.event.review.body || '' }}

            # Instructions
            - Always clear context before you start from new request
            # Scenarios
            - If triggered from an issue: 
              - implement it, propose changes in a new branch, create a PR with `closes #${{ github.event.issue.number }}`
            - If triggered from a PR comment: 
              - do changes according to comment
